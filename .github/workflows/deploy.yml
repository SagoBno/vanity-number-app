name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      region:
        description: AWS region
        required: true
        default: us-east-1
        type: choice
        options:
          - us-east-1
      allowed_origin:
        description: Dashboard origin allowed by API Gateway CORS
        required: true
        default: http://localhost:5173
      dashboard_callback_url:
        description: Cognito OAuth callback URL for the dashboard
        required: true
        default: http://localhost:5173/
      dashboard_logout_url:
        description: Cognito OAuth logout URL for the dashboard
        required: true
        default: http://localhost:5173/
      connect_instance_arn:
        description: Optional Amazon Connect instance ARN allowed to invoke the generation Lambda
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy SAM stack
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    concurrency:
      group: deploy-${{ inputs.stage }}-${{ inputs.region }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install CloudFormation linter
        run: pip install cfn-lint

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run quality gate
        run: |
          npm test
          npm run typecheck
          npm run frontend:typecheck
          npm run build:all
          npm run lint
          npm run format:check
          npm run sam:validate

      - name: Validate deploy inputs
        shell: bash
        run: |
          set -euo pipefail

          validate_url() {
            local name="$1"
            local value="$2"

            if [[ ! "$value" =~ ^https?://[^[:space:]\;\&\|\`\$]+$ ]]; then
              echo "$name must be an http(s) URL without shell metacharacters."
              exit 1
            fi
          }

          [[ "${{ inputs.stage }}" =~ ^[a-z0-9-]+$ ]] || {
            echo "stage must contain only lowercase letters, numbers, and hyphens."
            exit 1
          }

          [[ "${{ inputs.region }}" == "us-east-1" ]] || {
            echo "region must be us-east-1 for this workflow."
            exit 1
          }

          validate_url "allowed_origin" "${{ inputs.allowed_origin }}"
          validate_url "dashboard_callback_url" "${{ inputs.dashboard_callback_url }}"
          validate_url "dashboard_logout_url" "${{ inputs.dashboard_logout_url }}"

          if [[ -n "${{ inputs.connect_instance_arn }}" && ! "${{ inputs.connect_instance_arn }}" =~ ^arn:aws[-a-z0-9]*:connect:${{ inputs.region }}:[0-9]{12}:instance/[-a-zA-Z0-9]+$ ]]; then
            echo "connect_instance_arn must be empty or a Connect instance ARN in the selected region."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Build SAM application
        run: npm run sam:build

      - name: Deploy SAM stack
        env:
          STAGE: ${{ inputs.stage }}
          REGION: ${{ inputs.region }}
          ALLOWED_ORIGIN: ${{ inputs.allowed_origin }}
          DASHBOARD_CALLBACK_URL: ${{ inputs.dashboard_callback_url }}
          DASHBOARD_LOGOUT_URL: ${{ inputs.dashboard_logout_url }}
          CONNECT_INSTANCE_ARN: ${{ inputs.connect_instance_arn }}
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "vanity-number-app-${STAGE}" \
            --region "${REGION}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Stage="${STAGE}" \
              AllowedOrigin="${ALLOWED_ORIGIN}" \
              DashboardCallbackUrl="${DASHBOARD_CALLBACK_URL}" \
              DashboardLogoutUrl="${DASHBOARD_LOGOUT_URL}" \
              ConnectInstanceArn="${CONNECT_INSTANCE_ARN}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
